<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">

  <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
    <div>
      <h2 class="text-2xl font-bold text-gray-800">Directorio de Proveedores</h2>
      <p class="text-sm text-gray-500 font-medium">Gestión de socios comerciales y abastecimiento</p>
    </div>

    <div class="flex flex-wrap gap-3 items-center">
      <span class="relative inline-block">
        <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 z-10"></i>
        <input pInputText type="text" (input)="dt.filterGlobal($any($event.target).value, 'contains')"
          placeholder="Buscar RUC o Razón Social..." class="!pl-10 w-64" />
      </span>

      <ng-container *ngIf="puedeGestionar">
        <p-button icon="pi pi-file-excel" pTooltip="Exportar CSV" tooltipPosition="bottom"
                  styleClass="p-button-success shadow-md shadow-green-500/30" (click)="exportarDatos()"></p-button>

        <p-button label="Nuevo Proveedor" icon="pi pi-building" styleClass="p-button-primary shadow-md shadow-blue-500/30"
          (click)="abrirModalNuevo()"></p-button>
      </ng-container>
    </div>
  </div>

  <p-table #dt [value]="proveedores" [lazy]="true" (onLazyLoad)="cargarProveedores($event)" [rows]="rowsPerPage"
    [totalRecords]="totalRecords" [paginator]="true" [loading]="loading" [rowsPerPageOptions]="[5, 10, 20]"
    [showCurrentPageReport]="true" currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
    styleClass="p-datatable-sm" class="border-t border-gray-100">

    <ng-template pTemplate="header">
      <tr>
        <th class="w-16 text-center">N°</th>
        <th>RUC</th>
        <th>Empresa / Razón Social</th>
        <th>Contacto</th>
        <th class="w-24">Estado</th>
        <th class="w-28 text-center" *ngIf="puedeGestionar">Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-item let-rowIndex="rowIndex">
      <tr class="hover:bg-gray-50 transition-colors" [ngClass]="{'opacity-60': !item.estado}">
        <td class="font-semibold text-gray-500 text-center">{{ rowIndex + 1 }}</td>

        <td class="font-medium text-gray-800">{{ item.ruc }}</td>

        <td>
          <div class="flex flex-col gap-0.5">
            <span class="font-bold text-gray-900">{{ item.razonSocial }}</span>
            <span class="text-xs text-gray-500" *ngIf="item.nombreComercial"><i class="pi pi-tag text-[10px] mr-1"></i>{{ item.nombreComercial }}</span>
          </div>
        </td>

        <td>
          <div class="flex flex-col text-sm">
            <span class="text-gray-600"><i class="pi pi-envelope text-xs mr-1"></i>{{ item.email }}</span>
            <span class="text-gray-600"><i class="pi pi-phone text-xs mr-1"></i>{{ item.telefono }}</span>
          </div>
        </td>

        <td>
          <p-tag [severity]="item.estado ? 'success' : 'danger'" [value]="item.estado ? 'Activo' : 'Inactivo'"></p-tag>
        </td>

        <td class="text-center" *ngIf="puedeGestionar">
          <div class="flex items-center justify-center gap-1">
            <ng-container *ngIf="item.estado">
              <p-button icon="pi pi-pencil" styleClass="p-button-rounded p-button-text p-button-info p-button-sm"
                (click)="abrirModalEditar(item)"></p-button>

              <p-button icon="pi pi-trash" styleClass="p-button-rounded p-button-text p-button-danger p-button-sm"
                (click)="eliminar(item)"></p-button>
            </ng-container>
            <ng-container *ngIf="!item.estado">
              <p-button icon="pi pi-refresh" styleClass="p-button-rounded p-button-text p-button-success p-button-sm"
                (click)="restaurar(item)" pTooltip="Restaurar"></p-button>
            </ng-container>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>

</div>

<p-dialog [header]="proveedorSeleccionado ? 'Editar Proveedor' : 'Nuevo Proveedor'"
          [(visible)]="modalVisible"
          [modal]="true"
          [style]="{ width: '650px' }"
          [draggable]="false"
          [resizable]="false"
          styleClass="p-fluid">

  <app-proveedor-form
    *ngIf="modalVisible"
    [proveedorAEditar]="proveedorSeleccionado"
    (onGuardado)="alGuardarProveedor($event)"
    (onCancelar)="modalVisible = false">
  </app-proveedor-form>

</p-dialog>

<p-toast position="top-right"></p-toast>
<p-confirmDialog [style]="{width: '450px'}"></p-confirmDialog>
