<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h2 class="text-2xl font-bold text-gray-800">Formas de Pago</h2>
            <p class="text-sm text-gray-500 font-medium">Métodos transaccionales permitidos en el sistema</p>
        </div>

        <div class="flex gap-3">
            <span class="relative inline-block">
                <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 z-10"></i>
                <input pInputText type="text" (input)="dt.filterGlobal($any($event.target).value, 'contains')"
                    placeholder="Buscar método..." class="!pl-10 w-64" />
            </span>
            <p-button label="Nueva Forma de Pago" icon="pi pi-plus"
                styleClass="p-button-primary shadow-md shadow-blue-500/30" (click)="abrirModalNuevo()"></p-button>
        </div>
    </div>

    <p-table #dt [value]="formasPago" [lazy]="true" (onLazyLoad)="cargarFormasPago($event)" [rows]="rowsPerPage"
        [totalRecords]="totalRecords" [paginator]="true" [loading]="loading" [rowsPerPageOptions]="[5, 10, 20]"
        [showCurrentPageReport]="true"
        currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros" styleClass="p-datatable-sm"
        class="border-t border-gray-100">
        <ng-template pTemplate="header">
            <tr>
                <th class="w-16 text-center">N°</th>
                <th class="w-64">Nombre</th>
                <th>Descripción</th>
                <th class="w-24">Estado</th>
                <th class="w-28 text-center">Acciones</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-fp let-rowIndex="rowIndex">
            <tr class="hover:bg-gray-50 transition-colors" [ngClass]="{'opacity-60': !fp.activo}">

                <td class="font-semibold text-gray-500 text-center">{{ rowIndex + 1 }}</td>

                <td class="font-bold text-gray-900">{{ fp.nombre }}</td>
                <td class="text-gray-600 truncate max-w-[200px] text-sm">{{ fp.descripcion || '—' }}</td>

                <td>
                    <p-tag [severity]="fp.activo ? 'success' : 'danger'" [value]="fp.activo ? 'Activo' : 'Inactivo'">
                    </p-tag>
                </td>

                <td class="text-center">
                    <div class="flex items-center justify-center gap-1">
                        <ng-container *ngIf="fp.activo">
                            <p-button icon="pi pi-pencil"
                                styleClass="p-button-rounded p-button-text p-button-info p-button-sm"
                                (click)="abrirModalEditar(fp)"></p-button>
                            <p-button icon="pi pi-trash"
                                styleClass="p-button-rounded p-button-text p-button-danger p-button-sm"
                                (click)="eliminarFormaPago(fp)"></p-button>
                        </ng-container>

                        <ng-container *ngIf="!fp.activo">
                            <p-button icon="pi pi-refresh"
                                styleClass="p-button-rounded p-button-text p-button-success p-button-sm"
                                (click)="restaurarFormaPago(fp)" pTooltip="Restaurar"></p-button>
                        </ng-container>
                    </div>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="5" class="text-center py-8 text-gray-500 font-medium">
                    <i class="pi pi-inbox text-2xl mb-2 text-gray-400 block"></i>
                    No se encontraron formas de pago.
                </td>
            </tr>
        </ng-template>
    </p-table>

</div>

<p-dialog [header]="modoEdicion ? 'Editar Forma de Pago' : 'Nueva Forma de Pago'" [(visible)]="modalVisible"
    [modal]="true" [style]="{ width: '450px' }" [draggable]="false" [resizable]="false" styleClass="p-fluid">

    <form [formGroup]="formaPagoForm" (ngSubmit)="guardarFormaPago()" class="mt-4 flex flex-col gap-4">

        <div class="flex flex-col gap-1">
            <label for="nombre" class="font-medium text-gray-700 text-sm">Nombre de la Forma de Pago <span
                    class="text-red-500">*</span></label>
            <input pInputText id="nombre" formControlName="nombre"
                placeholder="Ej. Efectivo, Tarjeta, Yape, Transferencia..." autocomplete="off" />
            <small class="text-red-500"
                *ngIf="formaPagoForm.get('nombre')?.invalid && formaPagoForm.get('nombre')?.touched">
                El nombre es obligatorio y no debe exceder 100 caracteres.
            </small>
        </div>

        <div class="flex flex-col gap-1">
            <label for="descripcion" class="font-medium text-gray-700 text-sm">Descripción</label>
            <textarea pTextarea id="descripcion" formControlName="descripcion" rows="3"
                placeholder="Ej. Pagos mediante pasarelas bancarias o efectivo directo..."></textarea>
        </div>

    </form>

    <ng-template pTemplate="footer">
        <div class="flex justify-end gap-2 mt-4">
            <p-button label="Cancelar" icon="pi pi-times" styleClass="p-button-text p-button-secondary"
                (click)="cerrarModal()"></p-button>
            <p-button [label]="modoEdicion ? 'Actualizar' : 'Guardar'" icon="pi pi-check" styleClass="p-button-primary"
                (click)="guardarFormaPago()"></p-button>
        </div>
    </ng-template>

</p-dialog>

<p-toast position="top-right"></p-toast>
<p-confirmDialog [style]="{width: '450px'}"></p-confirmDialog>
