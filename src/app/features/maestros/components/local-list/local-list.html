<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">

  <div class="flex justify-between items-center mb-6">
    <div>
      <h2 class="text-2xl font-bold text-gray-800">Locales</h2>
      <p class="text-sm text-gray-500 font-medium">
        Gestión de sucursales y puntos de atención
      </p>
    </div>

    <div class="flex gap-3">
      <span class="relative inline-block">
        <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 z-10"></i>
        <input
          pInputText
          type="text"
          (input)="dt.filterGlobal($any($event.target).value, 'contains')"
          placeholder="Buscar..."
          class="!pl-10 w-64" />
      </span>

      <p-button
        label="Nuevo Local"
        icon="pi pi-plus"
        styleClass="p-button-primary"
        (click)="abrirModalNuevo()">
      </p-button>
    </div>
  </div>

  <p-table
    #dt
    [value]="locales"
    [lazy]="true"
    (onLazyLoad)="cargarLocales($event)"
    [rows]="rowsPerPage"
    [totalRecords]="totalRecords"
    [paginator]="true"
    [loading]="loading">

    <ng-template pTemplate="header">
      <tr>
        <th>N°</th>
        <th>Foto</th>
        <th>Nombre</th>
        <th>Dirección</th>
        <th>Teléfono</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-local let-rowIndex="rowIndex">
      <tr [ngClass]="{'opacity-60': !local.estado}">

        <td>{{ rowIndex + 1 }}</td>

        <td>
          <div class="w-12 h-12 border rounded overflow-hidden">

            <img
              *ngIf="local.fotoPortadaUrl"
              [src]="local.fotoPortadaUrl"
              class="w-full h-full object-cover">

            <div
              *ngIf="!local.fotoPortadaUrl"
              class="w-full h-full flex items-center justify-center text-gray-400">
              <i class="pi pi-image"></i>
            </div>

          </div>
        </td>

        <td>{{ local.nombre }}</td>
        <td>{{ local.direccion }}</td>
        <td>{{ local.telefono }}</td>

        <td>
          <p-tag
            [severity]="local.estado ? 'success' : 'danger'"
            [value]="local.estado ? 'Activo' : 'Inactivo'">
          </p-tag>
        </td>

        <td>
          <div class="flex gap-1">

            <ng-container *ngIf="local.estado">

              <p-button
                icon="pi pi-pencil"
                styleClass="p-button-rounded p-button-text p-button-info p-button-sm"
                (click)="abrirModalEditar(local)">
              </p-button>

              <p-button
                icon="pi pi-trash"
                styleClass="p-button-rounded p-button-text p-button-danger p-button-sm"
                (click)="eliminar(local)">
              </p-button>

            </ng-container>

            <ng-container *ngIf="!local.estado">

              <p-button
                icon="pi pi-refresh"
                styleClass="p-button-rounded p-button-text p-button-success p-button-sm"
                (click)="restaurar(local)">
              </p-button>

            </ng-container>

          </div>
        </td>

      </tr>
    </ng-template>

  </p-table>

</div>

<p-dialog
  [header]="modoEdicion ? 'Editar Local' : 'Nuevo Local'"
  [(visible)]="modalVisible"
  [modal]="true"
  [style]="{ width: '600px' }">

  <form [formGroup]="localForm" class="flex flex-col gap-4 mt-3">

    <div>
      <label class="font-medium">Nombre *</label>
      <input pInputText formControlName="nombre" class="w-full">
    </div>

    <div>
      <label class="font-medium">Dirección *</label>
      <input pInputText formControlName="direccion" class="w-full">
    </div>

    <div>
      <label class="font-medium">Teléfono *</label>
      <input pInputText formControlName="telefono" class="w-full">
    </div>

    <div>
      <label class="font-medium">Foto URL</label>
      <input pInputText formControlName="fotoPortadaUrl" class="w-full">
    </div>

  </form>

  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2">

      <p-button
        label="Cancelar"
        severity="secondary"
        (click)="cerrarModal()">
      </p-button>

      <p-button
        label="Guardar"
        (click)="guardar()">
      </p-button>

    </div>
  </ng-template>

</p-dialog>

<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>
