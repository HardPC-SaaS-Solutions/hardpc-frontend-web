<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">

  <div class="flex justify-between items-center mb-6">
    <div>
      <h2 class="text-2xl font-bold text-gray-800">Tipos de Comprobante</h2>
      <p class="text-sm text-gray-500 font-medium">
        Gestión de comprobantes electrónicos y documentos de venta
      </p>
    </div>

    <div class="flex gap-3">
      <span class="relative inline-block">
        <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 z-10"></i>
        <input
          pInputText
          type="text"
          (input)="dt.filterGlobal($any($event.target).value, 'contains')"
          placeholder="Buscar..."
          class="!pl-10 w-64" />
      </span>

      <p-button
        label="Nuevo"
        icon="pi pi-plus"
        styleClass="p-button-primary"
        (click)="abrirModalNuevo()">
      </p-button>
    </div>
  </div>

  <p-table
    #dt
    [value]="tiposComprobante"
    [lazy]="true"
    (onLazyLoad)="cargarTiposComprobante($event)"
    [rows]="rowsPerPage"
    [totalRecords]="totalRecords"
    [paginator]="true"
    [loading]="loading"
    [rowsPerPageOptions]="[5,10,20]"
    styleClass="p-datatable-sm">

    <ng-template pTemplate="header">
      <tr>
        <th>N°</th>
        <th>Descripción</th>
        <th>Código SUNAT</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-item let-rowIndex="rowIndex">
      <tr [ngClass]="{'opacity-60': !item.estado}">
        <td>{{ rowIndex + 1 }}</td>
        <td>{{ item.descripcion }}</td>
        <td>{{ item.codigoSunat }}</td>

        <td>
          <p-tag
            [severity]="item.estado ? 'success' : 'danger'"
            [value]="item.estado ? 'Activo' : 'Inactivo'">
          </p-tag>
        </td>

        <td>
          <div class="flex gap-1">

            <ng-container *ngIf="item.estado">
              <p-button
                icon="pi pi-pencil"
                styleClass="p-button-rounded p-button-text p-button-info p-button-sm"
                (click)="abrirModalEditar(item)">
              </p-button>

              <p-button
                icon="pi pi-trash"
                styleClass="p-button-rounded p-button-text p-button-danger p-button-sm"
                (click)="eliminar(item)">
              </p-button>
            </ng-container>

            <ng-container *ngIf="!item.estado">
              <p-button
                icon="pi pi-refresh"
                styleClass="p-button-rounded p-button-text p-button-success p-button-sm"
                (click)="restaurar(item)">
              </p-button>
            </ng-container>

          </div>
        </td>
      </tr>
    </ng-template>

  </p-table>

</div>

<p-dialog
  [header]="modoEdicion ? 'Editar Tipo de Comprobante' : 'Nuevo Tipo de Comprobante'"
  [(visible)]="modalVisible"
  [modal]="true"
  [style]="{ width: '500px' }">

  <form [formGroup]="tipoComprobanteForm" class="flex flex-col gap-4 mt-3">

    <div>
      <label class="font-medium">Descripción *</label>
      <input
        pInputText
        formControlName="descripcion"
        class="w-full">
    </div>

    <div>
      <label class="font-medium">Código SUNAT *</label>
      <input
        pInputText
        formControlName="codigoSunat"
        class="w-full">
    </div>

  </form>

  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2">
      <p-button
        label="Cancelar"
        severity="secondary"
        (click)="cerrarModal()">
      </p-button>

      <p-button
        label="Guardar"
        (click)="guardar()">
      </p-button>
    </div>
  </ng-template>

</p-dialog>

<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>
