<div class="p-2 md:p-6">

    <!-- Encabezado del Dashboard -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Catálogos Maestros</h1>
        <p class="text-gray-500 mt-2 font-medium">Panel central de configuración del sistema. Selecciona un módulo para administrar sus registros.</p>
    </div>

    <!-- Cuadrícula de Tarjetas -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

        <!-- Iteración de los módulos usando el nuevo syntax @for de Angular (si usas Angular 17+) -->
        <!-- Si usas Angular 16 o anterior, cambia esto por un *ngFor -->
        @for (mod of modulos; track mod.titulo) {
            <a [routerLink]="mod.ruta"
               class="block group bg-white rounded-2xl p-6 border border-gray-100 shadow-sm hover:shadow-xl hover:shadow-gray-200/50 hover:border-blue-100 transition-all duration-300 ease-out hover:-translate-y-1 cursor-pointer relative overflow-hidden">

                <!-- Efecto de brillo de fondo al hacer hover -->
                <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-gradient-to-br from-white/50 to-transparent rounded-full opacity-0 group-hover:opacity-100 transition-opacity"></div>

                <!-- Ícono con fondo dinámico -->
                <div [class]="'w-14 h-14 rounded-xl flex items-center justify-center mb-5 transition-transform group-hover:scale-110 ' + mod.colorFondo">
                    <i [class]="mod.icono + ' text-2xl ' + mod.colorTexto"></i>
                </div>

                <!-- Textos -->
                <h3 class="text-lg font-bold text-gray-800 group-hover:text-blue-600 transition-colors">
                    {{ mod.titulo }}
                </h3>
                <p class="text-sm text-gray-500 mt-1.5 leading-relaxed">
                    {{ mod.descripcion }}
                </p>

                <!-- Flecha indicadora que aparece en hover -->
                <div class="absolute bottom-6 right-6 opacity-0 group-hover:opacity-100 transition-all group-hover:translate-x-1">
                    <i class="pi pi-arrow-right text-blue-500 text-sm"></i>
                </div>
            </a>
        }

    </div>

</div>
