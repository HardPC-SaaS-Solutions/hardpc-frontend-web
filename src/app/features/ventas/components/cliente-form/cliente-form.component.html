<form [formGroup]="clienteForm" (ngSubmit)="guardar()" class="mt-4 styleClass='p-fluid'">

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
    <div class="flex flex-col gap-1 md:col-span-2">
      <label class="font-medium text-gray-700 text-sm">Naturaleza Jurídica <span class="text-red-500">*</span></label>
      <p-select formControlName="tipoCliente" [options]="opcionesFormTipoCliente" optionLabel="label" optionValue="value"
                placeholder="Seleccione el tipo" [appendTo]="'body'" styleClass="w-full"></p-select>
      <small class="text-red-500" *ngIf="clienteForm.get('tipoCliente')?.invalid && clienteForm.get('tipoCliente')?.touched">
        Seleccione la naturaleza jurídica.
      </small>
    </div>

    <div class="flex flex-col gap-1">
      <label class="font-medium text-gray-700 text-sm">Tipo Documento <span class="text-red-500">*</span></label>
      <p-select formControlName="idTipoDocumento" [options]="opcionesTipoDoc" optionLabel="abreviatura" optionValue="id"
                placeholder="Seleccione" [appendTo]="'body'" (onChange)="onTipoDocumentoChange($event)" styleClass="w-full"></p-select>
      <small class="text-red-500" *ngIf="clienteForm.get('idTipoDocumento')?.invalid && clienteForm.get('idTipoDocumento')?.touched">
        Seleccione un tipo de documento.
      </small>
    </div>

    <div class="flex flex-col gap-1">
      <label class="font-medium text-gray-700 text-sm">Número Documento <span class="text-red-500">*</span></label>
      <input pInputText formControlName="numeroDocumento" autocomplete="off" class="w-full" />
      <small class="text-red-500" *ngIf="clienteForm.get('numeroDocumento')?.invalid && clienteForm.get('numeroDocumento')?.touched">
        El documento es obligatorio y debe tener {{ longitudDocRequerida }} caracteres.
      </small>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4" *ngIf="clienteForm.get('tipoCliente')?.value === 'PERSONA_NATURAL'">
    <div class="flex flex-col gap-1">
      <label class="font-medium text-gray-700 text-sm">Nombres <span class="text-red-500">*</span></label>
      <input pInputText formControlName="nombres" autocomplete="off" class="w-full" />
      <small class="text-red-500" *ngIf="clienteForm.get('nombres')?.invalid && clienteForm.get('nombres')?.touched">
        Los nombres son obligatorios.
      </small>
    </div>
    <div class="flex flex-col gap-1">
      <label class="font-medium text-gray-700 text-sm">Apellidos <span class="text-red-500">*</span></label>
      <input pInputText formControlName="apellidos" autocomplete="off" class="w-full" />
      <small class="text-red-500" *ngIf="clienteForm.get('apellidos')?.invalid && clienteForm.get('apellidos')?.touched">
        Los apellidos son obligatorios.
      </small>
    </div>
  </div>

  <div class="grid grid-cols-1 gap-4 mb-4" *ngIf="clienteForm.get('tipoCliente')?.value === 'EMPRESA'">
    <div class="flex flex-col gap-1">
      <label class="font-medium text-gray-700 text-sm">Razón Social <span class="text-red-500">*</span></label>
      <input pInputText formControlName="razonSocial" autocomplete="off" placeholder="Ej. HardPC Solutions S.A.C." class="w-full" />
      <small class="text-red-500" *ngIf="clienteForm.get('razonSocial')?.invalid && clienteForm.get('razonSocial')?.touched">
        La razón social es obligatoria.
      </small>
    </div>
  </div>

  <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3 border-b pb-1">Datos de Contacto</h3>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="flex flex-col gap-1">
      <label class="font-medium text-gray-700 text-sm">Teléfono</label>
      <input pInputText formControlName="telefono" autocomplete="off" class="w-full" />
    </div>

    <div class="flex flex-col gap-1">
      <label class="font-medium text-gray-700 text-sm">Correo Electrónico</label>
      <input pInputText formControlName="email" type="email" autocomplete="off" class="w-full" />
      <small class="text-red-500" *ngIf="clienteForm.get('email')?.hasError('email') && clienteForm.get('email')?.touched">
        Ingrese un formato de correo válido.
      </small>
    </div>

    <div class="flex flex-col gap-1 md:col-span-2">
      <label class="font-medium text-gray-700 text-sm">Dirección</label>
      <input pInputText formControlName="direccion" autocomplete="off" class="w-full" />
    </div>
  </div>

  <div class="flex justify-end gap-2 pt-4 mt-2 border-t border-gray-100">
    <p-button label="Cancelar" icon="pi pi-times" styleClass="p-button-text p-button-secondary" (click)="cancelar()" [disabled]="guardando"></p-button>
    <p-button [label]="modoEdicion ? 'Actualizar' : 'Guardar'" icon="pi pi-check" styleClass="p-button-primary" type="submit" [loading]="guardando"></p-button>
  </div>

</form>
