<header class="h-20 bg-white shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] flex items-center justify-between px-8 z-10 relative">

  <div>
    <h1 class="text-2xl font-bold text-gray-800">Resumen del Sistema</h1>
  </div>

  <div class="flex items-center gap-5">

    <button class="p-2 text-gray-400 hover:text-blue-600 transition-colors relative">
      <i class="pi pi-bell text-xl"></i>
      <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
    </button>

    <div class="relative group">

      <div class="flex items-center gap-3 pl-5 border-l border-gray-200 cursor-pointer hover:bg-gray-50 p-2 rounded-lg transition-colors">
        <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold text-lg uppercase">
          {{ inicial }}
        </div>
        <div class="flex flex-col hidden sm:flex">
          <span class="text-sm font-bold text-gray-700 truncate max-w-[120px]">{{ nombreUsuario }}</span>
          <span class="text-xs text-gray-500 font-medium">{{ rolUsuario }}</span>
        </div>
        <i class="pi pi-angle-down text-gray-400 text-sm ml-1 group-hover:rotate-180 transition-transform duration-200"></i>
      </div>

      <div class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-gray-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
        <div class="py-2">

          <button class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-colors">
            <i class="pi pi-user mr-2"></i> Mi Perfil
          </button>

          <button class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-colors">
            <i class="pi pi-cog mr-2"></i> Configuración
          </button>

          <hr class="my-1 border-gray-100">

          <button
            (click)="cerrarSesion()"
            class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors font-medium">
            <i class="pi pi-sign-out mr-2"></i> Cerrar Sesión
          </button>

        </div>
      </div>

    </div>

  </div>
</header>
